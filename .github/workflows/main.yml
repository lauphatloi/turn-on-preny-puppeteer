name: Daily Puppeteer Bot
on:
  schedule:
    # This cron runs at 15:00 UTC every day (which is 22:00 Hanoi time)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install Linux dependencies for Chrome
        run: sudo apt-get update && sudo apt-get install -y libnss3 libxss1 libasound2 libatk-bridge2.0-0 libgtk-3-0 libgbm-dev
      
      - name: Download Chrome
        run: node ./node_modules/puppeteer/install.js
        
      - name: Run Puppeteer script
        run: node index.js
