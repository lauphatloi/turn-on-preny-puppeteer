name: Turn On Bot
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Use your Node version

      - name: Install dependencies
        run: npm install

      - name: Run Puppeteer script
        run: node turn_on.js
